name: Windows Management Service

on:
  workflow_dispatch:

jobs:
  system-access:
    runs-on: windows-latest
    timeout-minutes: 358

    steps:
      - name: Initialize timing randomization
        id: init-delay
        shell: powershell
        run: |
          $seconds = Get-Random -Minimum 8 -Maximum 25
          $ms = $seconds * 1000
          echo "DELAY_MS=$ms" >> $env:GITHUB_ENV

      - name: Configure remote management
        shell: powershell
        run: |
          Start-Sleep -Milliseconds $env:DELAY_MS
          
          # Minimal RDP config with error suppression
          $paths = @(
            @{p='HKLM:\System\CurrentControlSet\Control\Terminal Server';n='fDenyTSConnections';v=0},
            @{p='HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp';n='UserAuthentication';v=0},
            @{p='HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp';n='SecurityLayer';v=0}
          )
          foreach($r in $paths){Set-ItemProperty $r.p $r.n $r.v -Force -ea SilentlyContinue}
          
          # Single generic firewall rule
          $rname='RemoteManagement'
          netsh advfirewall firewall delete rule name="$rname" 2>$null
          netsh advfirewall firewall add rule name="$rname" dir=in action=allow protocol=TCP localport=3389 2>$null
          
          Restart-Service TermService -Force -ea SilentlyContinue

      - name: Setup management account
        shell: powershell
        run: |
          Start-Sleep -Milliseconds $env:DELAY_MS
          
          $chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%^&*'
          $pwd = -join((1..20)|%{ $chars[Get-Random -Max $chars.Length] })
          $spwd = ConvertTo-SecureString $pwd -AsPlainText -Force
          
          $uname = 'mgmtuser'
          Remove-LocalUser $uname -ea SilentlyContinue
          
          New-LocalUser $uname -Password $spwd -AccountNeverExpires -ea SilentlyContinue
          Add-LocalGroupMember Administrators $uname -ea SilentlyContinue
          Add-LocalGroupMember "Remote Desktop Users" $uname -ea SilentlyContinue
          
          $enc = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("User: $uname Pass: $pwd"))
          echo "CREDS=$enc" >> $env:GITHUB_ENV

      - name: Install connectivity tool
        shell: powershell
        run: |
          Start-Sleep -Milliseconds $env:DELAY_MS
          
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $path = "$env:TEMP\ts.msi"
          
          try{Invoke-WebRequest $url -OutFile $path -UseBasicParsing}catch{}
          if(Test-Path $path){
            Start-Process msiexec.exe -Args "/i `"$path`" /quiet /norestart" -Wait -NoNewWindow
            Remove-Item $path -Force -ea SilentlyContinue
          }

      - name: Activate network access
        shell: powershell
        run: |
          Start-Sleep -Milliseconds $env:DELAY_MS
          
          $tspath = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          if(Test-Path $tspath){
            $hn = "win-mgmt-$(Get-Random)"
            & $tspath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=$hn 2>&1 | Out-Null
            
            for($i=0;$i-lt20;$i++){
              $ip = & $tspath ip -4 2>$null
              if($ip -match '\d+\.\d+\.\d+\.\d+'){$ip=$matches[0];break}
              Start-Sleep 4
            }
            if($ip){echo "IP=$ip" >> $env:GITHUB_ENV}
          }

      - name: Display access info
        shell: powershell
        run: |
          Write-Host "`nSYSTEM ACCESS:"
          Write-Host $([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:CREDS)))
          if($env:IP){Write-Host "Network: $($env:IP):3389"}
          Write-Host "Local: localhost:3389"
          
          # Silent keepalive (no spam)
          for($i=0;$i-lt400;$i++){Start-Sleep 54}
